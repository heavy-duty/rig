# path → scope:* map for actions/labeler — the PR half of LABELS.md's scope
# story (issues are hand-scoped at triage; paths only exist on PRs). Additive
# only: sync-labels stays off in labels.yml, so a hand-applied scope survives.
"scope:bootstrap":
  - changed-files:
      - any-glob-to-any-file: ["commands/bootstrap.sh"]
"scope:users":
  - changed-files:
      - any-glob-to-any-file:
          ["commands/users-*.sh", "commands/lib/users-config.sh"]
"scope:runner":
  - changed-files:
      - any-glob-to-any-file:
          ["commands/runner-*.sh", "commands/lib/runner-config.sh"]
"scope:coolify":
  - changed-files:
      - any-glob-to-any-file: ["commands/coolify-*.sh"]
"scope:db":
  - changed-files:
      - any-glob-to-any-file: ["commands/db.sh", "test/db-integration.sh"]
"scope:installer":
  - changed-files:
      - any-glob-to-any-file: ["install.sh"]
